<!-- upload.html -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Run Photo</title>
  <link rel="stylesheet" href="style.css">
</head>

<!-- Firebase core SDK -->
<script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-app-compat.js"></script>
<!-- Firebase Realtime Database SDK -->
<script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDdQctV5kYz-6J1E3eyoIFQS5LMJfofZfo",
    authDomain: "themorningrunclubwebsite.firebaseapp.com",
    databaseURL: "https://themorningrunclubwebsite-default-rtdb.firebaseio.com",
    projectId: "themorningrunclubwebsite",
    storageBucket: "themorningrunclubwebsite.firebasestorage.app",
    messagingSenderId: "176502578161",
    appId: "1:176502578161:web:5146655e2ecf86dc0f0250",
    measurementId: "G-YYV6TS45EX"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
</script>

<body>

  <script>
    const pass = prompt("Enter password to upload:");
    if (pass !== "runforGod") {
      alert("Incorrect password");
      window.location.href = "index.html";
    }
  </script>

  <h1>Upload a Run</h1>

  <form id="uploadForm">
    <label for="photo">Photo:</label>
    <input type="file" id="photo" accept="image/*" multiple required>

    <label for="runType">Run Type:</label>
    <select id="runType" required>
      <option value="Monday Morning Run">Monday Morning Run</option>
      <option value="Charity Race">Charity Race</option>
      <option value="Race Prep">Race Prep</option>
      <option value="Season Recap">Season Recap</option>
      <option value="Announcement">Announcement</option>
    </select>

    <label for="verse">Verse:</label>
    <input type="text" id="verse" placeholder="Example: Hebrews 12:1">

    <label for="distance">Distance:</label>
    <input type="text" id="distance" placeholder="Example: 2.1 miles or Not recorded">

    <label for="runners">Runners Present:</label>
    <input type="text" id="runners" placeholder="Example: 3 or Not recorded">

    <label for="weather">Weather / Conditions:</label>
    <input type="text" id="weather" placeholder="Example: Cool and clear">

    <label for="caption">Caption / Reflection:</label>
    <textarea id="caption" required></textarea><br>

    <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 1rem;">
      <button type="button" onclick="window.location.href='index.html'">⬅ Back</button>
      <button type="submit">Upload</button>
    </div>
  </form>

  <p id="status"></p>

  <script>
    const CLOUD_NAME = "dhz1cvu0c";
    const UPLOAD_PRESET = "morningrunblog";

    const form = document.getElementById('uploadForm');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const files = document.getElementById('photo').files;
      const runType = document.getElementById('runType').value;
      const verse = document.getElementById('verse').value.trim();
      const distance = document.getElementById('distance').value.trim();
      const runners = document.getElementById('runners').value.trim();
      const weather = document.getElementById('weather').value.trim();
      const caption = document.getElementById('caption').value.trim();
      const uploadedImageUrls = [];

      status.innerText = 'Uploading images...';

      try {
        for (const file of files) {
          const formData = new FormData();
          formData.append('file', file);
          formData.append('upload_preset', UPLOAD_PRESET);

          const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
            method: 'POST',
            body: formData
          });

          const data = await res.json();

          if (!data.secure_url) {
            throw new Error("Cloudinary upload failed.");
          }

          uploadedImageUrls.push(data.secure_url);
        }

        status.innerText = 'Saving blog post...';

        const newPostRef = db.ref('posts').push();
        await newPostRef.set({
          imageUrls: uploadedImageUrls,
          runType: runType,
          verse: verse,
          distance: distance,
          runners: runners,
          weather: weather,
          caption: caption,
          date: new Date().toISOString()
        });

        status.innerText = 'Upload successful!';
        form.reset();
      } catch (error) {
        console.error(error);
        status.innerText = 'Something went wrong. Check the console.';
      }
    });
  </script>
</body>

</html>
